<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZSPD METAR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .card { background: #1e293b; border-radius: 24px; padding: 28px; width: 100%; max-width: 400px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .title { font-size: 0.9rem; color: #64748b; }
    .title strong { display: block; font-size: 1.1rem; color: #e2e8f0; margin-top: 2px; }
    .refresh-btn { background: #334155; border: none; color: #94a3b8; padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; }
    .refresh-btn:hover { background: #475569; }
    .refresh-btn.loading { opacity: 0.6; pointer-events: none; }

    .main-temp { text-align: center; padding: 20px 0 12px; }
    .temp-num { font-size: 5rem; font-weight: 200; line-height: 1; color: #f1f5f9; }
    .condition { text-align: center; font-size: 1.2rem; color: #94a3b8; margin-top: 6px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
    .item { background: #0f172a; border-radius: 14px; padding: 16px; }
    .item .label { font-size: 0.75rem; color: #475569; margin-bottom: 6px; }
    .item .value { font-size: 1.1rem; font-weight: 600; color: #e2e8f0; }
    .item .value.small { font-size: 0.9rem; }

    .forecast { margin-top: 12px; background: #0f172a; border-radius: 14px; padding: 16px; display: flex; justify-content: space-around; text-align: center; }
    .forecast .item { background: transparent; padding: 0 8px; }
    .forecast .label { font-size: 0.75rem; color: #475569; margin-bottom: 6px; }
    .forecast .value { font-size: 1.4rem; font-weight: 700; }
    .forecast .hi { color: #f97316; }
    .forecast .lo { color: #38bdf8; }

    .raw { margin-top: 16px; background: #0f172a; border-radius: 12px; padding: 12px 16px; font-family: 'Courier New', monospace; font-size: 0.85rem; color: #4fc3f7; letter-spacing: 0.3px; word-break: break-all; }

    .footer { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid #334155; }
    .footer input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 7px 12px; border-radius: 8px; width: 56px; text-align: center; font-size: 0.9rem; }
    .footer input:focus { outline: none; border-color: #4fc3f7; }
    .footer button { background: #0ea5e9; border: none; color: #fff; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .footer button:hover { background: #0284c7; }

    .next { text-align: center; font-size: 0.75rem; color: #475569; margin-top: 8px; }
    .updated { text-align: center; font-size: 0.75rem; color: #475569; margin-top: 4px; }
    .loading { text-align: center; padding: 48px 0; color: #475569; font-size: 1rem; }
    .loading::after { content: '...'; animation: dots 1.5s infinite; }
    @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }
    .error { text-align: center; padding: 40px 0; color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="title">
        <span>📍 上海浦东机场</span>
        <strong>ZSPD</strong>
      </div>
      <button class="refresh-btn" id="btn">🔄</button>
    </div>

    <div id="loading" class="loading">加载中</div>
    <div id="error" class="error" style="display:none"></div>
    <div id="content" style="display:none">
      <div class="main-temp">
        <div class="temp-num" id="temp">--°</div>
        <div class="condition" id="cond">--</div>
      </div>
      <div class="grid">
        <div class="item"><div class="label">💨 风速</div><div class="value small" id="wind">--</div></div>
        <div class="item"><div class="label">🌡 气压</div><div class="value" id="pressure">--</div></div>
        <div class="item"><div class="label">💧 湿度</div><div class="value" id="humidity">--</div></div>
        <div class="item"><div class="label">👁 能见度</div><div class="value" id="visib">--</div></div>
      </div>
      <div class="forecast">
        <div class="item">
          <div class="label">▲ 今日最高</div>
          <div class="value hi" id="maxTemp">--</div>
        </div>
        <div class="item">
          <div class="label">▼ 今日最低</div>
          <div class="value lo" id="minTemp">--</div>
        </div>
      </div>
      <div class="raw" id="raw"></div>
    </div>

    <div class="footer">
      <input type="number" id="minInput" min="1" max="60" value="5">
      <span style="color:#64748b;font-size:0.85rem">分钟刷新</span>
      <button id="setBtn">设置</button>
    </div>
    <div class="updated" id="updated">数据抓取: --</div>
    <div class="next" id="next"></div>
  </div>

  <script>
    var DATA_URL = 'https://raw.githubusercontent.com/wildwake123-afk/shanghai-weather/main/data/metar.json';
    var FORECAST_URL = 'https://api.open-meteo.com/v1/forecast?latitude=31.1445&longitude=121.8083&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FShanghai&forecast_days=3';
    var interval = parseInt(localStorage.getItem('metarInterval')) || 5;
    var timer = null, nextTimer = null, lastFetchTime = 0;

    document.getElementById('minInput').value = interval;

    function parseMetar(raw) {
      var r = { temp: '--', dewp: '--', wind: '--', windKts: '--', pressure: '--', visibility: '--' };
      if (!raw) return r;
      var td = raw.match(/(M)?(\d{2})\/(M)?(\d{2})/);
      if (td) {
        r.temp = (td[1] ? '-' : '') + td[2] + '°C';
        r.dewp = (td[3] ? '-' : '') + td[4] + '°C';
      }
      var wm = raw.match(/(\d{3})(\d{2})MPS/);
      if (wm) {
        var dir = parseInt(wm[1]), spd = parseInt(wm[2]);
        var dirs = ['北','北北东','东北东','东北','东','东南东','东南','南','西南西','西南','西','西北西','西北','北北西','北北西','北'];
        r.wind = dirs[Math.round(dir / 22.5) % 16] + ' ' + spd + 'm/s';
        r.windKts = (spd * 1.944).toFixed(1) + 'kt';
      }
      var gst = raw.match(/G(\d{2})MPS/);
      if (gst) r.wind += ' 阵风' + gst[1] + 'm/s';
      var vrb = raw.match(/(\d{3})V(\d{3})/);
      if (vrb) r.wind += ' 变风' + vrb[1] + '°~' + vrb[2] + '°';
      var pm = raw.match(/Q(\d{4})/);
      if (pm) r.pressure = pm[1] + ' hPa';
      if (raw.indexOf('CAVOK') !== -1 || raw.indexOf('9999') !== -1) {
        r.visibility = '≥10km';
      } else {
        var vim = raw.match(/(\d{4})/);
        if (vim) r.visibility = (parseInt(vim[1]) / 1000).toFixed(1) + 'km';
      }
      return r;
    }

    function getCondition(raw) {
      if (raw.indexOf('CAVOK') !== -1) return { icon: '☀️', text: '晴空万里' };
      if (raw.indexOf('SKC') !== -1) return { icon: '☀️', text: '晴' };
      var wxMap = {
        'TS': ['⛈️','雷暴'], 'TSRA': ['⛈️','雷雨'], 'RA': ['🌧️','雨'],
        'DZ': ['🌧️','毛毛雨'], 'SN': ['❄️','雪'], 'SG': ['🌨️','雪粒'],
        'GR': ['🧊','冰雹'], 'GS': ['🌨️','小冰雹'], 'BR': ['🌫️','轻雾'],
        'FG': ['🌫️','雾'], 'HZ': ['🌫️','霾'], 'SQ': ['💨','飑'], 'FC': ['🌪️','龙卷风']
      };
      var wx = raw.match(/(TS|TSRA|RA|DZ|SN|SG|GR|GS|BR|FG|HZ|SQ|FC)/);
      if (wx && wxMap[wx[0]]) return { icon: wxMap[wx[0]][0], text: wxMap[wx[0]][1] };
      if (raw.indexOf('OVC') !== -1) return { icon: '☁️', text: '阴天' };
      if (raw.indexOf('BKN') !== -1) return { icon: '☁️', text: '多云' };
      if (raw.indexOf('SCT') !== -1) return { icon: '⛅', text: '疏云' };
      if (raw.indexOf('FEW') !== -1) return { icon: '🌤️', text: '少云' };
      return { icon: '☁️', text: '多云' };
    }

    function calcRH(temp, dewp) {
      var t = parseFloat(temp), d = parseFloat(dewp);
      if (isNaN(t) || isNaN(d) || t <= d) return '--';
      var rh = 100 * Math.exp((17.625 * d) / (243.04 + d) - (17.625 * t) / (243.04 + t));
      return Math.round(rh) + '%';
    }

    function loadMetar() {
      var btn = document.getElementById('btn');
      btn.classList.add('loading');
      document.getElementById('loading').style.display = 'block';
      document.getElementById('content').style.display = 'none';
      document.getElementById('error').style.display = 'none';

      // METAR（必须成功）
      window.fetch(DATA_URL + '?t=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(d) {
          btn.classList.remove('loading');
          document.getElementById('loading').style.display = 'none';
          document.getElementById('content').style.display = 'block';

          var p = parseMetar(d.rawOb);
          var cond = getCondition(d.rawOb);

          document.getElementById('temp').textContent = p.temp;
          document.getElementById('cond').textContent = cond.icon + ' ' + cond.text;
          document.getElementById('wind').textContent = p.wind + ' (' + p.windKts + ')';
          document.getElementById('pressure').textContent = p.pressure;
          document.getElementById('humidity').textContent = calcRH(p.temp, p.dewp);
          document.getElementById('visib').textContent = p.visibility;
          document.getElementById('raw').textContent = d.rawOb;

          var updated = new Date(d.updated);
          document.getElementById('updated').textContent = '数据抓取: ' + updated.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
          lastFetchTime = Date.now();
        })
        .catch(function() {
          btn.classList.remove('loading');
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent = 'METAR 获取失败，请检查网络';
        });

      // 今日预报（可选）
      window.fetch(FORECAST_URL + '&t=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(fc) {
          if (fc && fc.daily && fc.daily.time) {
            var today = new Date().toISOString().slice(0, 10);
            var idx = fc.daily.time.indexOf(today);
            if (idx === -1) idx = 0;
            document.getElementById('maxTemp').textContent = Math.round(fc.daily.temperature_2m_max[idx]) + '°';
            document.getElementById('minTemp').textContent = Math.round(fc.daily.temperature_2m_min[idx]) + '°';
          }
        });
    }

    function startTimer() {
      clearInterval(timer);
      clearInterval(nextTimer);
      timer = setInterval(loadMetar, interval * 60000);
      nextTimer = setInterval(function() {
        var elapsed = Date.now() - lastFetchTime;
        var remaining = Math.max(0, interval * 60000 - (elapsed % (interval * 60000)));
        var mm = Math.floor(remaining / 60000);
        var ss = Math.floor((remaining % 60000) / 1000);
        document.getElementById('next').textContent = '下次刷新 ' + mm + ':' + (ss < 10 ? '0' : '') + ss;
      }, 1000);
    }

    document.getElementById('btn').addEventListener('click', loadMetar);
    document.getElementById('setBtn').addEventListener('click', function() {
      var v = parseInt(document.getElementById('minInput').value);
      if (v >= 1 && v <= 60) {
        interval = v;
        localStorage.setItem('metarInterval', v);
        startTimer();
      }
    });

    loadMetar();
    startTimer();
  </script>
</body>
</html>
